kind = "web"
previewPath = "/"
title = "ENS d.o.o."
version = "1.0.0"
id = "artifacts/ens-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20852

[services.development]
run = "pnpm --filter @workspace/ens-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ens-web", "run", "build" ]
publicDir = "artifacts/ens-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20852"
BASE_PATH = "/"
